<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>METEO 会員ホーム</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>
<body>
<main class="app">

  <header class="home-header">
    <img src="images/logo-horizontal.png" alt="METEO" class="logo">
    <p class="copy">あなたのゴルフライフを、もっと楽しく。</p>

    <button class="bell" onclick="goNews()" aria-label="お知らせ">
      <span class="material-symbols-rounded">notifications</span>
      <i></i>
    </button>
  </header>

  <section class="member-block">
    <p id="greeting" class="greeting">こんにちは！</p>

    <h1>
      <span id="memberName">読み込み中</span>
      <small>様</small>
    </h1>

    <div class="member-status-row">
      <div class="member-badge">
        <span class="material-symbols-rounded">workspace_premium</span>
        <span id="memberType">---</span>
      </div>

      <div class="expire-inline" id="expireInline">
        <span>有効期限</span>
        <strong id="expireDate">----</strong>
      </div>
    </div>
  </section>

  <section class="point-card" onclick="goPoint()">
    <div class="point-mark">P</div>

    <p class="point-title">現在ポイント</p>

    <div class="point-main">
      <span id="pointBalance">0</span>
      <small>pt</small>
    </div>

    <div class="point-button">
      ポイント履歴を見る
      <span class="material-symbols-rounded">chevron_right</span>
    </div>
  </section>

  <section class="notice-card" onclick="goNews()">
    <span class="material-symbols-rounded notice-main-icon">campaign</span>

    <div>
      <h2>本日のお知らせ</h2>
      <p id="todayNews">本日は 22:00 まで営業しております。</p>
    </div>

    <span class="material-symbols-rounded arrow">chevron_right</span>
  </section>

  <section class="tip-card">
    <span class="material-symbols-rounded tip-main-icon">lightbulb</span>

    <div>
      <h2>本日のワンポイント</h2>
      <p id="todayTip">7番アイアンで100ヤードを10球連続で狙ってみましょう！</p>
    </div>

    <div class="tip-illust">
      <span class="material-symbols-rounded">golf_course</span>
    </div>
  </section>

  <section class="quick-grid">
    <button onclick="goQR()">
      <span class="material-symbols-rounded blue">qr_code_2</span>
      <strong>QR会員証</strong>
      <small>受付で提示</small>
    </button>

    <button onclick="goPoint()">
      <span class="material-symbols-rounded navy">credit_card</span>
      <strong>ポイント履歴</strong>
      <small>利用履歴を確認</small>
    </button>

    <button onclick="goEvent()">
      <span class="material-symbols-rounded orange">calendar_month</span>
      <strong>イベント</strong>
      <small>開催予定を確認</small>
    </button>

    <button onclick="goNews()">
      <span class="material-symbols-rounded purple">campaign</span>
      <strong>お知らせ</strong>
      <small>最新情報を確認</small>
    </button>
  </section>

  <section class="wide-list">
    <button onclick="goSettings()">
      <span class="material-symbols-rounded">settings</span>
      <strong>設定</strong>
      <span class="material-symbols-rounded">chevron_right</span>
    </button>

    <button class="logout" onclick="logout()">
      <span class="material-symbols-rounded">logout</span>
      <strong>ログアウト</strong>
    </button>
  </section>

  <div class="bottom-space"></div>

  <nav class="bottom-nav">
    <button class="active" onclick="goHome()">
      <span class="material-symbols-rounded">home</span>
      <small>ホーム</small>
    </button>

    <button onclick="goQR()">
      <span class="material-symbols-rounded">qr_code_2</span>
      <small>会員証</small>
    </button>

    <button onclick="goPoint()">
      <span class="material-symbols-rounded">paid</span>
      <small>ポイント</small>
    </button>

    <button onclick="goEvent()">
      <span class="material-symbols-rounded">event</span>
      <small>イベント</small>
    </button>

    <button onclick="goSettings()">
      <span class="material-symbols-rounded">more_horiz</span>
      <small>その他</small>
    </button>
  </nav>

</main>

<script src="js/home.js"></script>
</body>
</html>
