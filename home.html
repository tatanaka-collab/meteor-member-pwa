<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>METEO 会員ホーム</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>

<body>
<main class="app">

  <header class="home-header">
    <img src="images/logo-horizontal.png" alt="METEO" class="logo">
    <p class="copy">あなたのゴルフライフを、もっと楽しく。</p>

    
  </header>

  <section class="member-block">
    <p id="greeting" class="greeting">こんにちは！</p>

    <h1>
      <span id="memberName">読み込み中</span>
      <small>様</small>
    </h1>

    <div class="member-status-row">
      <div class="member-badge">
        <span class="material-symbols-rounded">workspace_premium</span>
        <span id="memberType">---</span>
      </div>

      <div class="expire-inline" id="expireInline">
        <span>有効期限</span>
        <strong id="expireDate">----</strong>
      </div>
    </div>
  </section>

  <section class="point-card point-card-static">
    <div class="point-mark">P</div>
    <p class="point-title">現在ポイント</p>

    <div class="point-main">
      <span id="pointBalance">0</span>
      <small>pt</small>
    </div>
  </section>

  <section id="homeNewsCard" class="notice-card home-news-list-card" onclick="goNews()" style="display:none;">
    <span class="material-symbols-rounded notice-main-icon">campaign</span>

    <div>
      <h2>お知らせ</h2>
      <div id="homeNewsList" class="home-news-list"></div>
    </div>

    <span class="material-symbols-rounded arrow">chevron_right</span>
  </section>

  <section id="homeEventCard" class="home-event-card" onclick="goEvent()" style="display:none;">
    <div id="homeEventImageWrap" class="home-event-image-wrap">
      <div class="home-event-placeholder">開催予定イベント</div>
    </div>

    <div class="home-event-body">
      <div class="home-event-head">
        <p class="home-event-label">
          <span class="material-symbols-rounded">celebration</span>
          開催予定イベント
        </p>
      </div>

      <h2 id="homeEventTitle">イベント名</h2>

      <div class="home-event-info">
        <p>
          <span class="material-symbols-rounded">calendar_month</span>
          <strong id="homeEventDate">日時</strong>
        </p>

        <p>
          <span class="material-symbols-rounded">location_on</span>
          <strong id="homeEventPlace">場所</strong>
        </p>
      </div>

      <div class="home-event-more">
        <span>詳しく見る</span>
        <span class="material-symbols-rounded">chevron_right</span>
      </div>
    </div>
  </section>

  <section class="quick-grid">
    <button onclick="goQR()">
      <span class="material-symbols-rounded blue">qr_code_2</span>
      <strong>QR会員証</strong>
      <small>受付で提示</small>
    </button>

    <button onclick="goEvent()">
      <span class="material-symbols-rounded orange">calendar_month</span>
      <strong>イベント</strong>
      <small>開催予定を確認</small>
    </button>

    <button onclick="goNews()">
      <span class="material-symbols-rounded purple">campaign</span>
      <strong>お知らせ</strong>
      <small>最新情報を確認</small>
    </button>

    <button onclick="goSettings()">
      <span class="material-symbols-rounded navy">settings</span>
      <strong>メニュー</strong>
      <small>各種メニュー</small>
    </button>
  </section>

  <section class="wide-list">
    <button class="logout" onclick="logout()">
      <span class="material-symbols-rounded">logout</span>
      <strong>ログアウト</strong>
    </button>
  </section>

  <div class="bottom-space"></div>

  <nav class="bottom-nav">
    <button class="active" onclick="goHome()">
      <span class="material-symbols-rounded">home</span>
      <small>ホーム</small>
    </button>

    <button onclick="goQR()">
      <span class="material-symbols-rounded">qr_code_2</span>
      <small>会員証</small>
    </button>

    <button onclick="goEvent()">
      <span class="material-symbols-rounded">event</span>
      <small>イベント</small>
    </button>

    <button onclick="goNews()">
      <span class="material-symbols-rounded">campaign</span>
      <small>お知らせ</small>
    </button>

    <button onclick="goSettings()">
      <span class="material-symbols-rounded">menu</span>
      <small>メニュー</small>
    </button>
  </nav>

</main>

<script src="js/home.js"></script>
</body>
</html>
