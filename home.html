<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>METEO 会員ホーム</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-box">

<img src="images/logo-horizontal.png" class="logo">

<h1>METEO 会員ページ</h1>

<div class="sub">
ようこそ
</div>

<div class="member-card">
  <div id="memberName" class="member-name">読み込み中...</div>

  <div class="info-row">
    <span>会員種別</span>
    <strong id="memberType">-</strong>
  </div>

  <div class="info-row">
    <span>有効期限</span>
    <strong id="expireDate">-</strong>
  </div>

  <div class="point-box">
    <div>ポイント残高</div>
    <strong id="points">- pt</strong>
  </div>
</div>

<br>

<button>
ポイントを見る
</button>

<br><br>

<button>
QR会員証
</button>

<br><br>

<button onclick="logout()">
ログアウト
</button>

</div>

<script src="js/home.js"></script>

</body>
</html>
