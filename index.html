<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>METEO 会員PWA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic","Meiryo",sans-serif;
}

body{
    background:#f2f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:90%;
    max-width:380px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

.logo{
    width:180px;
    margin-bottom:20px;
}

h1{
    font-size:24px;
    color:#0b4fa3;
    margin-bottom:8px;
}

.sub{
    color:#777;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#0b4fa3;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#083b7d;
}

.version{
    margin-top:25px;
    color:#999;
    font-size:12px;
}
</style>

</head>

<body>

<div class="login-box">

<img src="images/logo.png" class="logo">

<h1>METEO 会員PWA</h1>

<div class="sub">
会員専用ログイン
</div>

<input
type="text"
placeholder="会員ID">

<input
type="password"
placeholder="パスワード">

<button>
ログイン
</button>

<div class="version">
Version 1.0
</div>

</div>

</body>
</html>
