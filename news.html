<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>お知らせ | METEO</title>
  <link rel="stylesheet" href="css/news.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>

<body>
<main class="app">

  <header class="page-header">
    <button class="back-btn" onclick="goHome()" aria-label="戻る">
      <span class="material-symbols-rounded">chevron_left</span>
    </button>

    <img src="images/logo-horizontal.png" alt="METEO" class="logo">
    <p class="copy">あなたのゴルフライフを、もっと楽しく。</p>
  </header>

  <section class="page-title">
    <h1>お知らせ</h1>
    <p>メテオからの最新情報をご確認いただけます。</p>
  </section>

  <section id="newsArea" class="news-area">
    <div class="loading-card">お知らせを読み込み中...</div>
  </section>

  <div class="bottom-space"></div>

  <nav class="bottom-nav">
    <button onclick="goHome()">
      <span class="material-symbols-rounded">home</span>
      <small>ホーム</small>
    </button>

    <button onclick="goQR()">
      <span class="material-symbols-rounded">qr_code_2</span>
      <small>会員証</small>
    </button>

    <button onclick="goEvent()">
      <span class="material-symbols-rounded">event</span>
      <small>イベント</small>
    </button>

    <button class="active" onclick="goNews()">
      <span class="material-symbols-rounded">campaign</span>
      <small>お知らせ</small>
    </button>

    <button onclick="goSettings()">
      <span class="material-symbols-rounded">menu</span>
      <small>メニュー</small>
    </button>
  </nav>

</main>

<script src="js/news.js"></script>
</body>
</html>
