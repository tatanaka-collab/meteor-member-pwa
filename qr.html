<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR会員証｜METEO</title>

  <link rel="stylesheet" href="css/qr.css" />
  <script src="js/qr.js" defer></script>
</head>

<body>
  <main class="app">
    <header class="header">
      <button class="back-btn" onclick="location.href='home.html'">‹</button>
      <div class="logo-area">
        <div class="logo-text">METEO</div>
        <p>あなたのゴルフライフを、もっと楽しく。</p>
      </div>
    </header>

    <section class="title-section">
      <h1>QR会員証</h1>
      <p>受付でこのQRコードをご提示ください。</p>
    </section>

    <section class="qr-card">
      <div class="member-badge" id="memberType">会員</div>

      <div class="qr-box">
        <img id="qrImage" alt="QR会員証" />
      </div>

      <div class="member-info">
        <p class="label">会員番号</p>
        <h2 id="memberNo">---</h2>

        <p class="name" id="memberName">---</p>

        <div class="limit-box">
          <span>有効期限</span>
          <strong id="expiryDate">----</strong>
        </div>
      </div>
    </section>

    <section class="notice-card">
      <strong>ご利用について</strong>
      <p>QRコードは受付時の本人確認に使用します。画面を明るくしてご提示ください。</p>
    </section>

    <nav class="bottom-nav">
      <a href="home.html">
        <span>⌂</span>
        <small>ホーム</small>
      </a>
      <a href="qr.html" class="active">
        <span>▦</span>
        <small>会員証</small>
      </a>
      <a href="point.html">
        <span>Ⓟ</span>
        <small>ポイント</small>
      </a>
      <a href="event.html">
        <span>▣</span>
        <small>イベント</small>
      </a>
      <a href="#">
        <span>…</span>
        <small>その他</small>
      </a>
    </nav>
  </main>
</body>
</html>
