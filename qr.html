<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR会員証｜METEO</title>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
  <link rel="stylesheet" href="css/qr.css" />
  <script src="js/qr.js" defer></script>
</head>

<body>
  <main class="app">

    <header class="header">
      <button class="back-btn" onclick="location.href='home.html'">
        <span>‹</span>
      </button>

      <img src="images/logo-horizontal.png" alt="METEO" class="logo-img" />
      <p class="catch">あなたのゴルフライフを、もっと楽しく。</p>
    </header>

    <section class="title-section">
      <h1>QR会員証</h1>
    </section>

    <section class="qr-card">
      <div class="member-badge" id="memberType">会員</div>

      <div class="qr-box">
        <img id="qrImage" alt="QR会員証" />
      </div>

      <div class="member-info">
        <p class="label">会員番号</p>
        <h2 id="memberNo">----</h2>

        <p class="name" id="memberName">----</p>

        <div class="limit-box">
          <span>有効期限</span>
          <strong id="expiryDate">確認中</strong>
        </div>
      </div>
    </section>

    <section class="notice-card">
      <div class="notice-icon">
        <span class="material-symbols-rounded">light_mode</span>
      </div>

      <div class="notice-text">
        <h2>受付でこのQRコードをご提示ください。</h2>
        <div class="notice-line"></div>
        <p>画面を明るくしてご提示ください。</p>
      </div>
    </section>

    <nav class="bottom-nav">
      <button onclick="location.href='home.html'">
        <span class="material-symbols-rounded">home</span>
        <small>ホーム</small>
      </button>

      <button class="active">
        <span class="material-symbols-rounded">qr_code_2</span>
        <small>会員証</small>
      </button>

      <button onclick="location.href='point.html'">
        <span class="material-symbols-rounded">paid</span>
        <small>ポイント</small>
      </button>

      <button onclick="location.href='event.html'">
        <span class="material-symbols-rounded">event</span>
        <small>イベント</small>
      </button>

      <button>
        <span class="material-symbols-rounded">more_horiz</span>
        <small>その他</small>
      </button>
    </nav>

  </main>
</body>
</html>
