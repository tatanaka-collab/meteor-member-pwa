<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>メニュー | METEO</title>

  <link rel="stylesheet" href="css/settings.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>

<body>
<main class="app">

  <header class="page-header">
    <button class="back-btn" onclick="goHome()" aria-label="戻る">
      <span class="material-symbols-rounded">chevron_left</span>
    </button>

    <img src="images/logo-horizontal.png" alt="METEO" class="logo">
    <p class="copy">あなたのゴルフライフを、もっと楽しく。</p>
  </header>

  <section class="page-title">
    <h1>メニュー</h1>
    <p>お問い合わせやアプリ情報をご確認いただけます。</p>
  </section>

  <section class="menu-list">

    <button class="menu-item" onclick="goContact()">
      <span class="material-symbols-rounded icon">call</span>
      <div>
        <strong>お問い合わせ</strong>
        <small>電話・店舗情報</small>
      </div>
      <span class="material-symbols-rounded arrow">chevron_right</span>
    </button>

    <button class="menu-item" onclick="goTerms()">
      <span class="material-symbols-rounded icon">description</span>
      <div>
        <strong>利用規約</strong>
        <small>サービス利用について</small>
      </div>
      <span class="material-symbols-rounded arrow">chevron_right</span>
    </button>

    <button class="menu-item" onclick="goPrivacy()">
      <span class="material-symbols-rounded icon">lock</span>
      <div>
        <strong>プライバシーポリシー</strong>
        <small>個人情報の取り扱い</small>
      </div>
      <span class="material-symbols-rounded arrow">chevron_right</span>
    </button>

    <button class="menu-item" onclick="goAbout()">
      <span class="material-symbols-rounded icon">info</span>
      <div>
        <strong>アプリについて</strong>
        <small>Version 1.1</small>
      </div>
      <span class="material-symbols-rounded arrow">chevron_right</span>
    </button>

    <button class="menu-item logout" onclick="logoutConfirm()">
      <span class="material-symbols-rounded icon">logout</span>
      <div>
        <strong>ログアウト</strong>
        <small>ログイン画面に戻ります</small>
      </div>
      <span class="material-symbols-rounded arrow">chevron_right</span>
    </button>

  </section>

  <div class="bottom-space"></div>

  <nav class="bottom-nav">
    <button onclick="goHome()">
      <span class="material-symbols-rounded">home</span>
      <small>ホーム</small>
    </button>

    <button onclick="goQR()">
      <span class="material-symbols-rounded">qr_code_2</span>
      <small>会員証</small>
    </button>

    <button onclick="goEvent()">
      <span class="material-symbols-rounded">event</span>
      <small>イベント</small>
    </button>

    <button onclick="goNews()">
      <span class="material-symbols-rounded">campaign</span>
      <small>お知らせ</small>
    </button>

    <button class="active" onclick="goSettings()">
      <span class="material-symbols-rounded">menu</span>
      <small>メニュー</small>
    </button>
  </nav>

</main>

<script src="js/settings.js"></script>
</body>
</html>
